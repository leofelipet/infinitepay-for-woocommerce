name: Build plugin ZIP

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve plugin version
        id: version
        run: |
          VERSION=$(sed -n 's/^[[:space:]]*\*[[:space:]]*Version:[[:space:]]*//p' infinitepay.php | head -1 | tr -d '\r')
          if [ -z "$VERSION" ]; then
            echo "Could not read Version from infinitepay.php" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Plugin version: $VERSION"

      - name: Assemble distribution package
        run: |
          SLUG=infinitepay
          VERSION="${{ steps.version.outputs.version }}"
          BUILD_DIR="build/${SLUG}"

          rm -rf build
          mkdir -p "$BUILD_DIR"

          rsync -a \
            --exclude-from='.distignore' \
            --exclude='build' \
            ./ "$BUILD_DIR/"

          echo "Package contents:"
          find "$BUILD_DIR" -type f | sort

          cd build
          zip -r "../${SLUG}-${VERSION}.zip" "$SLUG"
          cd ..

          unzip -l "${SLUG}-${VERSION}.zip"

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: infinitepay-${{ steps.version.outputs.version }}
          path: infinitepay-${{ steps.version.outputs.version }}.zip
          retention-days: 90

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: infinitepay-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
